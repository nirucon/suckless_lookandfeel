# =========================================================
# KITTY CONF - COLD NOIR DWM
# Mörk, kall, diskret noir-stil som passar din dwm-look
# Gjord för att även se bra ut i kew
# =========================================================

# -------------------------
# Fonts
# -------------------------
font_family      monospace
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

adjust_line_height  1
adjust_column_width 0

# -------------------------
# Window
# -------------------------
remember_window_size yes
initial_window_width 1200
initial_window_height 760
window_padding_width 10
placement_strategy center

# -------------------------
# Core colors
# -------------------------
background #0a0b0d
foreground #b8c0c4

cursor #d7dde0
cursor_text_color #0a0b0d

selection_foreground #e6ebed
selection_background #2a3136

# -------------------------
# Transparency
# -------------------------
background_opacity 0.85
dynamic_background_opacity yes

# -------------------------
# Borders
# -------------------------
active_border_color   #7e8b91
inactive_border_color #23282c
bell_border_color     #8fa7b2
window_border_width   1
draw_minimal_borders  yes

# -------------------------
# Tabs
# -------------------------
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_separator " ┇ "
active_tab_foreground   #0a0b0d
active_tab_background   #aeb9be
inactive_tab_foreground #8d969b
inactive_tab_background #14181b
tab_title_template "{title}"

# -------------------------
# Links / scrollback
# -------------------------
url_color #8ea8b5
underline_hyperlinks always

scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# -------------------------
# Bell
# -------------------------
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no
bell_on_tab no

# -------------------------
# Mouse / clipboard
# -------------------------
copy_on_select yes
strip_trailing_spaces smart
focus_follows_mouse no
mouse_hide_wait 2.0

# -------------------------
# Performance
# -------------------------
repaint_delay 10
input_delay 3
sync_to_monitor yes

# -------------------------
# Shell integration
# -------------------------
shell_integration enabled

# -------------------------
# Optional but useful
# -------------------------
allow_remote_control yes
confirm_os_window_close 0
disable_ligatures never

# =========================================================
# ANSI palette
# Viktigt: kew använder dessa mycket tydligt
# color3 och color11 är därför satta till kall grå,
# inte beige/gul, så bars i kew blir snygga.
# =========================================================

# black
color0  #101316
color8  #2a3035

# red
color1  #6f7b82
color9  #87939a

# green
color2  #6f8b8f
color10 #88a4a8

# yellow -> medvetet kall grå för kew-bars
color3  #7b8489
color11 #969fa4

# blue
color4  #6f8898
color12 #89a3b4

# magenta
color5  #78838f
color13 #919daa

# cyan
color6  #86a8b0
color14 #a4c4cb

# white
color7  #bcc4c8
color15 #e4e9eb

# -------------------------
# Marks / search
# -------------------------
mark1_foreground black
mark1_background #88a4a8

mark2_foreground black
mark2_background #89a3b4

mark3_foreground black
mark3_background #969fa4

# -------------------------
# Keybinds
# -------------------------
map ctrl+shift+f5 load_config_file

map ctrl+plus  change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0     change_font_size all 0

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab

map ctrl+shift+enter new_window
map ctrl+shift+w close_window
